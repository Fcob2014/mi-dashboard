<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Francisco">
<title>Francisco · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#111214; --surface:#18191d; --surface2:#1f2025;
    --border:#2b2c32; --text:#e8e9ec; --muted:#6b6e7a; --faint:#3a3b42;
    --p:#d4a843; --p-glow:rgba(212,168,67,0.12); --p-badge:rgba(212,168,67,0.15);
    --b:#4a9eff; --b-glow:rgba(74,158,255,0.12); --b-badge:rgba(74,158,255,0.15);
    --green:#5cba8a; --red:#e06b6b; --orange:#e08c4a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;min-height:100vh;}
  
  header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .logo{font-family:'Playfair Display',serif;font-size:18px;display:flex;align-items:center;gap:8px;}
  .logo-word{transition:color .3s;}
  .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  
  .tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:3px;}
  .tab{padding:5px 16px;border-radius:7px;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;color:var(--muted);border:none;background:none;font-family:inherit;}
  
  .refresh-btn{display:flex;align-items:center;gap:5px;border:1px solid var(--border);border-radius:8px;padding:5px 12px;background:var(--surface);color:var(--muted);cursor:pointer;font-family:inherit;font-size:11px;transition:all .2s;}
  .refresh-btn:hover{border-color:var(--text);color:var(--text);}
  .refresh-btn:disabled{opacity:.5;cursor:default;}
  .spin{display:inline-block;}
  .spinning{animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  
  .date-pill{font-size:10px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;}
  
  .stats-bar{display:flex;align-items:center;border-bottom:1px solid var(--border);overflow-x:auto;padding:0 24px;}
  .stat{padding:12px 22px;border-right:1px solid var(--border);flex-shrink:0;}
  .stat:last-child{border-right:none;margin-left:auto;}
  .stat-val{font-family:'Playfair Display',serif;font-size:22px;line-height:1;}
  .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:3px;}
  
  .summary-bar{margin:14px 24px 0;background:#1a1c1f;border-radius:10px;padding:10px 16px;display:none;}
  .summary-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;}
  .summary-text{font-size:12px;color:#9a9aa8;margin-top:3px;line-height:1.5;}
  
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:18px 24px 32px;}
  
  .card{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden;display:flex;flex-direction:column;}
  .card-header{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .card-icon{font-size:13px;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;}
  .card-title{font-family:'Playfair Display',serif;font-size:13px;}
  .card-badge{margin-left:auto;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;}
  
  .email-item{padding:9px 16px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s;display:flex;align-items:flex-start;gap:9px;}
  .email-item:hover{background:var(--surface2);}
  .email-item:last-child{border-bottom:none;}
  .dot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0;}
  .email-from{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .email-subject{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .email-time{font-size:10px;color:var(--muted);flex-shrink:0;padding-left:8px;}
  
  .cal-mini{padding:11px 16px;border-bottom:1px solid var(--border);}
  .cal-month{font-family:'Playfair Display',serif;font-size:11px;color:var(--muted);margin-bottom:7px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;}
  .cal-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:2px 0 4px;}
  .cal-day{font-size:11px;padding:4px 0;border-radius:5px;color:var(--muted);}
  .cal-day.today{font-weight:700;color:#111;}
  .cal-day.has-event{color:var(--green);font-weight:600;}
  
  .event-item{padding:9px 16px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:10px;align-items:center;cursor:pointer;transition:background .15s;}
  .event-item:hover{background:var(--surface2);}
  .event-item:last-child{border-bottom:none;}
  .e-date{text-align:center;min-width:28px;}
  .e-day-num{font-family:'Playfair Display',serif;font-size:19px;line-height:1;}
  .e-day-name{font-size:9px;color:var(--muted);text-transform:uppercase;}
  .e-title{font-size:12px;font-weight:500;}
  .e-time{font-size:10px;color:var(--muted);margin-top:2px;}
  .e-pill{font-size:10px;padding:2px 8px;border-radius:10px;margin-left:auto;flex-shrink:0;}
  
  .notes-scroll{flex:1;overflow-y:auto;padding:11px 16px 12px;max-height:400px;}
  .notes-scroll::-webkit-scrollbar{width:3px;}
  .notes-scroll::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px;}
  .section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border);}
  .note-section{margin-bottom:13px;}
  .note-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;}
  .note-item:hover .note-text{color:var(--text);}
  .note-check{width:13px;height:13px;border-radius:3px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:8px;}
  .note-text{font-size:11px;color:var(--muted);line-height:1.5;flex:1;transition:color .15s;}
  .note-text.done{text-decoration:line-through;color:var(--faint);}
  .note-tag{font-size:9px;padding:1px 5px;border-radius:7px;flex-shrink:0;margin-top:2px;}
  
  .add-area{padding:9px 16px 13px;border-top:1px solid var(--border);}
  .add-row{display:flex;gap:6px;}
  .add-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:inherit;font-size:11px;padding:6px 10px;outline:none;transition:border-color .2s;}
  .add-input:focus{border-color:var(--current-accent, var(--p));}
  .add-btn{border:none;border-radius:7px;padding:6px 12px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;transition:opacity .15s;}
  .add-btn:hover{opacity:.85;}
  
  .loading-state{padding:20px;text-align:center;color:var(--muted);font-size:12px;font-style:italic;}
  .empty-state{padding:16px;text-align:center;color:var(--muted);font-size:11px;font-style:italic;}

  /* Panel personal = gold, bosanet = blue */
  body.personal { --accent:var(--p); --glow:var(--p-glow); --badge:var(--p-badge); }
  body.bosanet  { --accent:var(--b); --glow:var(--b-glow); --badge:var(--b-badge); }
  
  .accent-color  { color:var(--accent); }
  .accent-bg     { background:var(--glow); }
  .accent-badge  { background:var(--badge); color:var(--accent); }
  .accent-border { border-color:var(--accent) !important; }
  .tab.active    { background:var(--badge); color:var(--accent); box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 30%,transparent); }
  .cal-day.today { background:var(--accent); }
  .dot.unread    { background:var(--accent); }
  .dot.read      { background:transparent; border:1px solid var(--faint); }
  .stat-val      { color:var(--accent); }
  .section-title { color:var(--accent); }
  .e-day-num     { color:var(--accent); }
  .e-pill        { background:var(--glow); color:var(--accent); }
  .note-check.done { background:rgba(92,186,138,.15); border-color:var(--green); color:var(--green); }
  .note-check.pending { border:1px solid var(--faint); }
  .add-btn       { background:var(--accent); color:#111; }
  .summary-bar   { border:1px solid color-mix(in srgb,var(--accent) 25%,transparent); }
  .summary-label { color:var(--accent); }

  @media(max-width:768px){
    .grid{grid-template-columns:1fr;padding:14px 16px 28px;}
    header{padding:14px 16px;}
    .stats-bar{padding:0 16px;}
    .summary-bar{margin:12px 16px 0;}
    .stat{padding:10px 16px;}
  }
</style>
</head>
<body class="personal">

<header>
  <div class="logo">
    Francisco <span style="color:#3a3b42">·</span>
    <span class="logo-word accent-color" id="logoWord">Personal</span>
  </div>
  <div class="header-right">
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
      <span class="spin" id="spinIcon">🔄</span>
      <span id="refreshLabel">Actualizar</span>
    </button>
    <div class="tabs">
      <button class="tab active" id="tabP" onclick="switchPanel('personal')">🙋 Personal</button>
      <button class="tab" id="tabB" onclick="switchPanel('bosanet')">🏢 Bosanet</button>
    </div>
    <div class="date-pill" id="datePill"></div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-val" id="statUnread">—</div><div class="stat-label">No leídos</div></div>
  <div class="stat"><div class="stat-val" id="statEvents">—</div><div class="stat-label">Eventos semana</div></div>
  <div class="stat"><div class="stat-val" id="statNotes">—</div><div class="stat-label">Tareas pendientes</div></div>
  <div class="stat"><div class="stat-val" id="statFlight">✈️</div><div class="stat-label" id="statFlightLabel">Vuelo Mar 3 · LAX</div></div>
  <div class="stat"><div style="font-family:'Playfair Display',serif;font-size:15px;font-style:italic;">Hola, <span class="accent-color">Francisco</span></div></div>
</div>

<div class="summary-bar" id="summaryBar">
  <div class="summary-label">🤖 Resumen del día</div>
  <div class="summary-text" id="summaryText"></div>
</div>

<div class="grid">

  <!-- EMAIL -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon accent-bg">📧</div>
      <span class="card-title" id="emailTitle">Gmail Personal</span>
      <div class="card-badge accent-badge" id="emailAccount">fcob2014@gmail.com</div>
    </div>
    <div id="emailList"><div class="loading-state">Cargando correos...</div></div>
  </div>

  <!-- CALENDAR -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon accent-bg">📅</div>
      <span class="card-title">Calendario</span>
      <div class="card-badge accent-badge" id="calBadge">Esta semana</div>
    </div>
    <div class="cal-mini">
      <div class="cal-month" id="calMonth"></div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div id="eventList"><div class="loading-state">Cargando eventos...</div></div>
  </div>

  <!-- NOTES -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon accent-bg">📝</div>
      <span class="card-title" id="notesTitle">Notas Personales</span>
      <div class="card-badge accent-badge" id="notesBadge">— pendientes</div>
    </div>
    <div class="notes-scroll" id="notesList"></div>
    <div class="add-area">
      <div class="add-row">
        <input class="add-input" id="noteInput" placeholder="Agregar tarea..." onkeydown="if(event.key==='Enter')addNote()">
        <button class="add-btn" onclick="addNote()">+ Agregar</button>
      </div>
    </div>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────
let panel = "personal";
let data = { personalEmails:[], bosanetEmails:[], events:[], summary:"" };

const PERSONAL_NOTES = [
  {id:1,section:"Varios USA",text:"William Fodge",tag:"general",done:false},
  {id:2,section:"Varios USA",text:"Revisar Seguro de la Casa",tag:"urgente",done:false},
  {id:3,section:"Varios USA",text:"Revisar seguro de Geico",tag:"urgente",done:false},
  {id:4,section:"Varios USA",text:"Finance Services Calentador",tag:"general",done:false},
  {id:5,section:"Varios USA",text:"Score Mamá: Colchón",tag:"general",done:false},
  {id:6,section:"Varios USA",text:"Hacer el Trust",tag:"urgente",done:false},
  {id:7,section:"Personal",text:"Contabilidad Dubo",tag:"general",done:false},
  {id:8,section:"Personal",text:"Cambia clave Apple",tag:"general",done:false},
  {id:9,section:"Personal",text:"Llamar Experian",tag:"urgente",done:false},
  {id:10,section:"Personal",text:"Cancelar Experian",tag:"urgente",done:false},
  {id:11,section:"Pagos Score",text:"Pagar el Carro $20k",tag:"finance",done:false},
  {id:12,section:"Pagos Score",text:"Pagar LNV Funding $9k",tag:"finance",done:false},
  {id:13,section:"Trámites",text:"Ventanas Impacto 1-800-641-2754",tag:"general",done:false},
  {id:14,section:"Trámites",text:"BOA – TC y Refinanciar carro",tag:"finance",done:false},
  {id:15,section:"Trámites",text:"American Express 20 días 800-700-7619",tag:"urgente",done:false},
  {id:16,section:"Trámites",text:"DIAN – Pagos Colombia",tag:"finance",done:false},
];

const BOSANET_NOTES = [
  {id:100,section:"Estratégico",text:"Seguros para BosaPay",tag:"strategic",done:false},
  {id:101,section:"Estratégico",text:"Contrato MX – revisar con abogado y visa",tag:"strategic",done:false},
  {id:102,section:"Estratégico",text:"Landing Bosanet → BosaExpress",tag:"strategic",done:false},
  {id:103,section:"Estratégico",text:"Acciones de Simón y Mariana",tag:"strategic",done:false},
  {id:104,section:"Estratégico",text:"BosaPay – excepciones $30",tag:"urgente",done:false},
  {id:105,section:"Estratégico",text:"Depositar todo en City National Bank",tag:"finance",done:false},
  {id:106,section:"Estratégico",text:"Enviar presupuesto a cada área",tag:"general",done:false},
  {id:107,section:"Marcas & Legal",text:"Registro Bosapay – buscar reunión",tag:"general",done:false},
  {id:108,section:"Marcas & Legal",text:"Registro marca BI – rechazada",tag:"urgente",done:false},
  {id:109,section:"Marcas & Legal",text:"Registro EU Trademarkia $3.000",tag:"finance",done:false},
  {id:110,section:"Marcas & Legal",text:"Abogado Plataforma B2B USA",tag:"general",done:false},
  {id:111,section:"Marcas & Legal",text:"Taxes Colombia",tag:"urgente",done:false},
  {id:112,section:"Marcas & Legal",text:"Cobrar UNFI",tag:"finance",done:false},
  {id:113,section:"Inversiones",text:"LUCIO: $15K",tag:"inversion",done:false},
  {id:114,section:"Inversiones",text:"JUAN GOMEZ – cambiar SAFE al 2024",tag:"inversion",done:false},
  {id:115,section:"Inversiones",text:"Preparar Due Diligence",tag:"inversion",done:false},
  {id:116,section:"Inversiones",text:"Business Plan y presentación gerencial",tag:"inversion",done:false},
  {id:117,section:"Inversiones",text:"SVB – responder",tag:"urgente",done:false},
  {id:118,section:"Aliados",text:"Bancoldex",tag:"general",done:false},
  {id:119,section:"Aliados",text:"Almuerzo: Landaeta Sysco",tag:"general",done:false},
  {id:120,section:"Aliados",text:"Almuerzo: Sandra OEA",tag:"general",done:false},
  {id:121,section:"Aliados",text:"Café: Danny",tag:"general",done:false},
];

const TAGS = {
  urgente:  {bg:"rgba(224,107,107,.15)",color:"#e06b6b",label:"⚡ Urgente"},
  strategic:{bg:"rgba(74,158,255,.12)", color:"#4a9eff",label:"🎯 Estratégico"},
  finance:  {bg:"rgba(92,186,138,.12)", color:"#5cba8a",label:"💰 Finanzas"},
  inversion:{bg:"rgba(224,140,74,.12)", color:"#e08c4a",label:"📈 Inversión"},
  general:  {bg:"transparent",          color:"#6b6e7a", label:""},
};

let pNotes = JSON.parse(localStorage.getItem("fx_pn") || "null") || PERSONAL_NOTES;
let bNotes = JSON.parse(localStorage.getItem("fx_bn") || "null") || BOSANET_NOTES;

// ── Date ──────────────────────────────────────────────
const WD=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"],MN=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const now = new Date();
document.getElementById("datePill").textContent = `${WD[now.getDay()]}, ${now.getDate()} ${MN[now.getMonth()]} ${now.getFullYear()}`;

// ── Calendar ──────────────────────────────────────────
function buildCal(eventDays) {
  const grid = document.getElementById("calGrid");
  const monthLabel = document.getElementById("calMonth");
  const d = new Date();
  monthLabel.textContent = `${MN[d.getMonth()]} ${d.getFullYear()}`;
  grid.innerHTML = "";
  ["D","L","M","M","J","V","S"].forEach(l => {
    const el = document.createElement("div");
    el.className = "cal-label"; el.textContent = l; grid.appendChild(el);
  });
  const firstDay = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
  const daysInMonth = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
  for (let i=0;i<firstDay;i++) { const e=document.createElement("div");e.className="cal-day";grid.appendChild(e); }
  for (let n=1;n<=daysInMonth;n++) {
    const e = document.createElement("div");
    e.className = "cal-day" + (n===d.getDate()?" today":"") + (eventDays.includes(n)?" has-event":"");
    e.textContent = n; grid.appendChild(e);
  }
}

// ── Panel Switch ──────────────────────────────────────
function switchPanel(p) {
  panel = p;
  document.body.className = p;
  document.getElementById("logoWord").textContent = p==="personal" ? "Personal" : "Bosanet";
  document.getElementById("tabP").className = "tab" + (p==="personal"?" active":"");
  document.getElementById("tabB").className = "tab" + (p==="bosanet"?" active":"");
  document.getElementById("emailTitle").textContent = p==="personal" ? "Gmail Personal" : "Outlook Bosanet";
  document.getElementById("emailAccount").textContent = p==="personal" ? "fcob2014@gmail.com" : "fborrero@bosanet.com";
  document.getElementById("notesTitle").textContent = p==="personal" ? "Notas Personales" : "Notas Bosanet";
  document.getElementById("statFlight").textContent = p==="personal" ? "✈️" : "🌴";
  document.getElementById("statFlightLabel").textContent = p==="personal" ? "Vuelo Mar 3 · LAX" : "Expo West · Mar 3";
  renderAll();
}

// ── Render Emails ─────────────────────────────────────
function renderEmails() {
  const emails = panel==="personal" ? data.personalEmails : data.bosanetEmails;
  const container = document.getElementById("emailList");
  if (!emails.length) { container.innerHTML = '<div class="empty-state">Sin correos recientes</div>'; return; }
  container.innerHTML = emails.map(e => `
    <div class="email-item">
      <div class="dot ${e.unread?'unread':'read'}"></div>
      <div style="flex:1;min-width:0">
        <div class="email-from">${e.from}</div>
        <div class="email-subject">${e.subject}</div>
      </div>
      <div class="email-time">${e.time}</div>
    </div>
  `).join("");
  document.getElementById("statUnread").textContent = emails.filter(e=>e.unread).length;
}

// ── Render Events ─────────────────────────────────────
function renderEvents() {
  const container = document.getElementById("eventList");
  buildCal(data.events.map(e=>e.day));
  document.getElementById("statEvents").textContent = data.events.length;
  if (!data.events.length) { container.innerHTML = '<div class="empty-state">Sin eventos esta semana</div>'; return; }
  container.innerHTML = data.events.map(e => `
    <div class="event-item">
      <div class="e-date">
        <div class="e-day-num accent-color">${e.day}</div>
        <div class="e-day-name">${e.dayName}</div>
      </div>
      <div style="flex:1">
        <div class="e-title">${e.title}</div>
        <div class="e-time">${e.time}</div>
      </div>
      <div class="e-pill">Viaje</div>
    </div>
  `).join("");
}

// ── Render Notes ──────────────────────────────────────
function renderNotes() {
  const notes = panel==="personal" ? pNotes : bNotes;
  const pending = notes.filter(n=>!n.done).length;
  document.getElementById("statNotes").textContent = pending;
  document.getElementById("notesBadge").textContent = `${pending} pendientes`;
  const sections = {};
  notes.forEach(n => { if(!sections[n.section]) sections[n.section]=[]; sections[n.section].push(n); });
  document.getElementById("notesList").innerHTML = Object.entries(sections).map(([sec,items]) => `
    <div class="note-section">
      <div class="section-title">${sec}</div>
      ${items.map(n => {
        const t = TAGS[n.tag];
        return `<div class="note-item" onclick="toggleNote(${n.id})">
          <div class="note-check ${n.done?'done':'pending'}">${n.done?'✓':''}</div>
          <div class="note-text ${n.done?'done':''}">${n.text}</div>
          ${t.label?`<div class="note-tag" style="background:${t.bg};color:${t.color}">${t.label}</div>`:''}
        </div>`;
      }).join("")}
    </div>
  `).join("");
}

function renderAll() { renderEmails(); renderEvents(); renderNotes(); }

// ── Toggle Note ───────────────────────────────────────
function toggleNote(id) {
  if (panel==="personal") {
    pNotes = pNotes.map(n => n.id===id ? {...n,done:!n.done} : n);
    localStorage.setItem("fx_pn", JSON.stringify(pNotes));
  } else {
    bNotes = bNotes.map(n => n.id===id ? {...n,done:!n.done} : n);
    localStorage.setItem("fx_bn", JSON.stringify(bNotes));
  }
  renderNotes();
}

// ── Add Note ──────────────────────────────────────────
function addNote() {
  const input = document.getElementById("noteInput");
  const text = input.value.trim();
  if (!text) return;
  const note = {id:Date.now(),section:"Nuevas",text,tag:"general",done:false};
  if (panel==="personal") { pNotes=[note,...pNotes]; localStorage.setItem("fx_pn",JSON.stringify(pNotes)); }
  else { bNotes=[note,...bNotes]; localStorage.setItem("fx_bn",JSON.stringify(bNotes)); }
  input.value="";
  renderNotes();
}

// ── Load Data from API ────────────────────────────────
async function loadData() {
  const btn = document.getElementById("refreshBtn");
  const icon = document.getElementById("spinIcon");
  const label = document.getElementById("refreshLabel");
  btn.disabled = true;
  icon.classList.add("spinning");
  label.textContent = "Actualizando...";

  try {
    const res = await fetch("/.netlify/functions/data");
    if (!res.ok) throw new Error("API error");
    const json = await res.json();
    data = {
      personalEmails: json.personalEmails || [],
      bosanetEmails:  json.bosanetEmails  || [],
      events:         json.events          || [],
      summary:        json.summary         || ""
    };
    if (data.summary) {
      document.getElementById("summaryBar").style.display = "block";
      document.getElementById("summaryText").textContent = data.summary;
    }
  } catch {
    // fallback static data
    data = {
      personalEmails: [
        {from:"Google",subject:"Security alert – Claude Calendar",time:"1:10 PM",unread:true},
        {from:"The New York Times",subject:"The Morning: Killing Iran's leader",time:"1:01 PM",unread:true},
        {from:"Uber Receipts",subject:"Saturday evening trip – $67.43",time:"12:19 PM",unread:true},
        {from:"Vineyard Vines",subject:"You Will *Love* These Bestselling Favorites",time:"7:17 AM",unread:false},
      ],
      bosanetEmails: [
        {from:"Dusty Gilvin · Cantor",subject:"Quick Intro at Expo West",time:"1:21 PM",unread:true},
        {from:"Cantor (reenvío)",subject:"FW- Quick Intro at Expo West",time:"1:31 PM",unread:true},
        {from:"QuickBooks / Intuit",subject:"Line of Credit payment coming due",time:"1:21 PM",unread:false},
      ],
      events: [
        {day:3,dayName:"Mar",title:"✈️ Flight to LAX (B6 2801)",time:"9:10 AM → 3:09 PM"},
        {day:6,dayName:"Mar",title:"✈️ Flight to FLL (B6 700)",time:"6:00 PM → 10:48 PM"},
      ],
      summary:""
    };
  }

  renderAll();
  const t = new Date();
  label.textContent = `${t.toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"})}`;
  icon.classList.remove("spinning");
  btn.disabled = false;
}

// ── Init ──────────────────────────────────────────────
buildCal([]);
